<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | X RPL</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cyber-blue': '#00d4ff',
                        'electric-purple': '#7b2ff7',
                        'neon-green': '#00ff88',
                        'dark-bg': '#0a0a0f',
                        'dark-section': '#0d0d15',
                    },
                    fontFamily: {
                        heading: ['Orbitron', 'sans-serif'],
                        body: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.09); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 100%; padding: 12px 16px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; transition: all 0.3s; outline: none; }
        .input-field:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0,212,255,0.15); }
        .input-field::placeholder { color: #6b7280; }
        #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glowPulse { 0%,100% { text-shadow: 0 0 20px rgba(0,212,255,0.5); } 50% { text-shadow: 0 0 40px rgba(123,47,247,0.8); } }
        .logo-glow { animation: glowPulse 3s ease-in-out infinite; }
        .card-enter { animation: fadeInUp 0.7s ease-out forwards; }
        .btn-login { background: linear-gradient(135deg, #00d4ff, #7b2ff7); border: none; color: #fff; width: 100%; padding: 14px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.35); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 10px; font-size: 0.875rem; display: none; }
        .error-msg.show { display: block; animation: fadeInUp 0.3s ease-out; }
        .eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6b7280; transition: color 0.2s; background: none; border: none; padding: 4px; }
        .eye-btn:hover { color: #00d4ff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(#00d4ff, #7b2ff7); border-radius: 3px; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center overflow-hidden">

    <canvas id="particles-canvas"></canvas>

    <!-- Decorative blobs -->
    <div class="fixed top-[-20%] left-[-10%] w-96 h-96 bg-cyber-blue/10 rounded-full blur-3xl pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-96 h-96 bg-electric-purple/10 rounded-full blur-3xl pointer-events-none z-0"></div>

    <div class="relative z-10 w-full max-w-md px-4">

        <!-- Logo & Back Link -->
        <div class="text-center mb-8 card-enter" style="animation-delay:0.1s; opacity:0;">
            <a href="index.html" class="inline-block group mb-2">
                <span class="font-heading text-4xl font-black bg-gradient-to-r from-cyber-blue to-electric-purple bg-clip-text text-transparent logo-glow">&lt;X_RPL/&gt;</span>
            </a>
            <p class="text-gray-500 text-sm mt-1">Admin Dashboard Login</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-3xl p-8 card-enter shadow-2xl" style="animation-delay:0.3s; opacity:0;">

            <div class="flex items-center gap-3 mb-7">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyber-blue to-electric-purple flex items-center justify-center text-xl">🔐</div>
                <div>
                    <h1 class="text-white font-heading font-bold text-lg">Masuk ke Dashboard</h1>
                    <p class="text-gray-500 text-xs">Admin &amp; Murid Kelas X RPL</p>
                </div>
            </div>

            <!-- Error Message -->
            <div class="error-msg mb-4" id="error-msg">
                <span id="error-text">Username atau password salah.</span>
            </div>

            <form id="login-form" class="space-y-5" autocomplete="off">
                <!-- Username -->
                <div>
                    <label class="block text-xs text-gray-400 mb-2 font-medium uppercase tracking-wider">Username</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">👤</span>
                        <input type="text" id="username" class="input-field pl-10" placeholder="Masukkan username" autocomplete="username" required>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-xs text-gray-400 mb-2 font-medium uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔑</span>
                        <input type="password" id="password" class="input-field pl-10 pr-12" placeholder="Masukkan password" autocomplete="current-password" required>
                        <button type="button" class="eye-btn" id="toggle-pw" aria-label="Toggle password visibility">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span id="btn-text">Masuk Sekarang →</span>
                    <span id="btn-loader" class="hidden">⏳ Memproses...</span>
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-white/5">
                <p class="text-xs text-gray-600 text-center mb-3">💡 Admin: <code class="text-cyber-blue">admin</code> / <code class="text-cyber-blue">admin123</code></p>
                <button type="button" onclick="toggleHint()" class="w-full text-xs text-gray-500 hover:text-cyber-blue transition-colors flex items-center justify-center gap-2">
                    <span>👥 Petunjuk Login Murid</span><span id="hint-arrow">▼</span>
                </button>
                <div id="student-hint" class="hidden mt-3 bg-white/3 rounded-xl p-3 border border-white/5">
                    <p class="text-xs text-gray-400 mb-2">Format username: <code class="text-neon-green">nama.lengkap</code> (huruf kecil)</p>
                    <p class="text-xs text-gray-400 mb-2">Password default: <code class="text-neon-green">murid123</code></p>
                    <p class="text-xs text-gray-600">Contoh: <code class="text-cyber-blue">ahmad.rizky</code> / <code class="text-cyber-blue">murid123</code></p>
                </div>
            </div>
        </div>

        <!-- Back to website -->
        <div class="text-center mt-6 card-enter" style="animation-delay:0.5s; opacity:0;">
            <a href="index.html" class="text-gray-500 hover:text-cyber-blue text-sm transition-colors">
                ← Kembali ke Website
            </a>
        </div>
    </div>

    <script>
    // ============================================================
    // Particle Background
    // ============================================================
    (function() {
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random()-.5)*.4;
                this.vy = (Math.random()-.5)*.4;
                this.r = Math.random()*1.5+.5;
                this.color = Math.random()>.5?'#00d4ff':'#7b2ff7';
                this.o = Math.random()*.4+.1;
            }
            update() {
                this.x+=this.vx; this.y+=this.vy;
                if(this.x<0||this.x>canvas.width) this.vx=-this.vx;
                if(this.y<0||this.y>canvas.height) this.vy=-this.vy;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
                ctx.fillStyle=this.color; ctx.globalAlpha=this.o; ctx.fill(); ctx.globalAlpha=1;
            }
        }

        const count = Math.min(window.innerWidth/14, 80);
        for(let i=0;i<count;i++) particles.push(new P());

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            for(let i=0;i<particles.length;i++) {
                for(let j=i+1;j<particles.length;j++) {
                    const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                    const d=Math.sqrt(dx*dx+dy*dy);
                    if(d<100) {
                        ctx.beginPath(); ctx.strokeStyle=`rgba(255,255,255,${.07-d/1400})`; ctx.lineWidth=.5;
                        ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();

    // ============================================================
    // Login Logic (localStorage-based, upgradeable to PHP)
    // ============================================================
    const ADMIN_CREDENTIALS = { username: 'admin', password: 'admin123' };

    function showError(msg) {
        const el = document.getElementById('error-msg');
        document.getElementById('error-text').textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', function() {
        const pw = document.getElementById('password');
        const isText = pw.type === 'text';
        pw.type = isText ? 'password' : 'text';
        document.getElementById('eye-icon').innerHTML = isText
            ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>'
            : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    });

    // Check if already logged in
    if (localStorage.getItem('xrpl_admin_logged_in') === 'true') {
        window.location.href = 'dashboard.html';
    }

    // Form submit
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');

        // Loading state
        btn.disabled = true;
        btnText.classList.add('hidden');
        btnLoader.classList.remove('hidden');

    function toggleHint() {
        const el = document.getElementById('student-hint');
        const arrow = document.getElementById('hint-arrow');
        el.classList.toggle('hidden');
        arrow.textContent = el.classList.contains('hidden') ? '▼' : '▲';
    }

        fetch('api/auth.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                localStorage.setItem('xrpl_admin_logged_in', 'true');
                localStorage.setItem('xrpl_admin_user', JSON.stringify(data.user));
                
                btnText.textContent = '✅ Berhasil! Mengalihkan...';
                btnText.classList.remove('hidden'); btnLoader.classList.add('hidden');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } else {
                showError(data.message || 'Username atau password salah.');
                btn.disabled = false;
                btnText.classList.remove('hidden'); btnLoader.classList.add('hidden');
            }
        })
        .catch(err => {
            console.error(err);
            showError('Terjadi kesalahan koneksi.');
            btn.disabled = false;
            btnText.classList.remove('hidden'); btnLoader.classList.add('hidden');
        });
    });

    // Keyboard shortcut: Enter
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('login-form').requestSubmit();
    });
    </script>
</body>
</html>
